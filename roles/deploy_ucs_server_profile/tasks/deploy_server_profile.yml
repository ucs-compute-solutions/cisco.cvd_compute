---
- name: Define anchor for Intersight API login info
  ansible.builtin.set_fact:
    api_info: &api_info
      api_private_key: "{{ deploy_ucs_server_profile_api_private_key }}"
      api_key_id: "{{ deploy_ucs_server_profile_api_key_id }}"
      api_uri: "{{ deploy_ucs_server_profile_api_uri | default(omit) }}"
      validate_certs: "{{ deploy_ucs_server_profile_validate_certs | default(omit) }}"

- name: Deploy server Profile - {{  }}
  cisco.intersight.intersight_rest_api:
    <<: *api_info
    resource_path: "/server/Profiles/{{ item }}"
    api_body:
      {
        "ScheduledActions":
          [
            {
              "Action": "ConfigChange",
              "ProceedOnReboot": false
            },
            {
              "Action": "Deploy",
              "ProceedOnReboot": true,
              "ActionQualifier": {
                "Scope":"all"
              }
            },
            {
              "Action": "Activate",
              "ProceedOnReboot": true
            }
          ]
      }
    update_method: post
  register: server_profile_activation