---
- name: Test FI firmware upgrade
  hosts: localhost
  vars:
    upgrade_fi_firmware_api_private_key: "{{ lookup('env', 'INTERSIGHT_API_PRIVATE_KEY') }}"
    upgrade_fi_firmware_api_key_id: "{{ lookup('env', 'INTERSIGHT_API_KEY_ID') }}"
    upgrade_fi_firmware_fi_list: ["Domain FI-A", "Domain FI-B"]
  gather_facts: false
  roles:
    - upgrade_fi_firmware
  tasks:
    - name: Validate the upgrade
      ansible.builtin.include_tasks: validate_upgrade.yml
      loop: "{{ upgrade_fi_firmware_fi_list }}"
      loop_control:
        loop_var: fi_name
