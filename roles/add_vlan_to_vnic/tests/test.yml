---
- name: Test Adding Vlan to a vNic in Intersight
  hosts: localhost
  vars:
    add_vlan_to_vnic_api_private_key: "{{ lookup('env', 'INTERSIGHT_API_PRIVATE_KEY') }}"
    add_vlan_to_vnic_api_key_id: "{{ lookup('env', 'INTERSIGHT_API_KEY_ID') }}"
    add_vlan_to_vnic_name_of_fi_vlan_policy: "VLAN-Policy-Name"
    add_vlan_to_vnic_vlan_multicast_policy: "MCAST-Policy-Name"
    add_vlan_to_vnic_vlan_id: 3002
    add_vlan_to_vnic_vlan_name: "TEST-VLAN"
    add_vlan_to_vnic_organization_name: "Org"
    add_vlan_to_vnic_ethernet_network_group_name: "SAN-A-Eth-Net-Grp"
  roles:
    - add_vlan_to_vnic
  tasks:
    - name: Validate that vlan was added properly to the vNic
      ansible.builtin.include_tasks: validate_vlan_to_vnic.yml
