---
- name: "Get chassis Id Moid for {{ chassis_name }}"
  cisco.intersight.intersight_rest_api:
    api_private_key: "{{ rediscover_chassis_api_private_key | default(omit) }}"
    api_key_id: "{{ rediscover_chassis_api_key_id | default(omit) }}"
    api_uri: "{{ rediscover_chassis_api_uri | default('https://intersight.com/api/v1') }}"
    validate_certs: "{{ rediscover_chassis_validate_certs }}"
    resource_path: /equipment/ChassisIdentities
    query_params:
      $filter: "Name eq '{{ chassis_name }}'"
  register: chassis_id_res

- name: "Execute chassis rediscovery for {{ chassis_name }}"
  cisco.intersight.intersight_rest_api:
    api_private_key: "{{ rediscover_chassis_api_private_key | default(omit) }}"
    api_key_id: "{{ rediscover_chassis_api_key_id | default(omit) }}"
    api_uri: "{{ rediscover_chassis_api_uri | default('https://intersight.com/api/v1') }}"
    validate_certs: "{{ rediscover_chassis_validate_certs }}"
    resource_path: /equipment/ChassisIdentities/{{ chassis_id_res.api_response.Moid }}
    update_method: "post"
    api_body: {
      "AdminAction": "Reack"
    }
  register: chassis_rediscovery_res
